<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>

  <!-- ✅ Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ✅ Your Custom CSS -->
  <link rel="stylesheet" href="header.css">

  <style>
    /* NAVBAR STYLE */
    .custom-navbar {
      background: linear-gradient(90deg, #ffffff, #f8f9fa);
      padding: 12px 0;
      border-bottom: 2px solid #eee;
    }

    .navbar-brand img {
      transition: 0.3s;
    }

    .navbar-brand img:hover {
      transform: scale(1.08);
    }

    .nav-link {
      position: relative;
      color: #333;
      font-weight: 500;
      transition: 0.3s;
    }

    .nav-link:hover {
      color: #ff9800 !important;
    }

    /* Mobile Menu */
    @media (max-width: 991px) {
      #navbarMenu {
        background: white;
        margin-top: 10px;
        border-radius: 12px;
        padding: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      }

      .nav-link {
        padding: 12px 10px;
        border-bottom: 1px solid #eee;
      }

      .nav-link:last-child {
        border-bottom: none;
      }
    }

    /* Remove button border */
    .navbar-toggler {
      border: none;
    }

    .navbar-toggler:focus {
      box-shadow: none;
    }
  </style>

</head>

<body>

  <!-- ✅ NAVBAR -->
  <nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container">

      <!-- LOGO -->
      <a class="navbar-brand" href="index.html">
        <img src="Images/header image.jpg" height="55" alt="Logo">
      </a>

      <!-- HAMBURGER -->
      <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarMenu"
        aria-controls="navbarMenu"
        aria-expanded="false">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- MENU -->
      <div class="collapse navbar-collapse" id="navbarMenu">
        <div class="ms-lg-auto d-flex flex-column flex-lg-row text-start">

          <a class="nav-link px-3" href="index.html">🏠 Home</a>
          <a class="nav-link px-3" href="about.html">About Us</a>
          <a class="nav-link px-3" href="contact.html">Contact Us</a>
          <a class="nav-link px-3" href="#">Privacy Policy</a>

        </div>
      </div>

    </div>
  </nav>


  <!-- ✅ Bootstrap JS (VERY IMPORTANT, KEEP AT END) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
