<!-- STYLE -->
<style>

/* NAVBAR BACKGROUND */
.custom-navbar {
  background: linear-gradient(90deg, #ffffff, #f8f9fa);
  padding: 12px 0;
  border-bottom: 2px solid #eee;
}

/* LOGO */
.navbar-brand img {
  transition: transform 0.3s;
}
.navbar-brand img:hover {
  transform: scale(1.08);
}

/* NAV LINKS */
.nav-link {
  position: relative;
  color: #333;
  font-weight: 500;
  transition: 0.3s;
}

/* HOVER EFFECT */
.nav-link:hover {
  color: #ff9800 !important;
}

/* UNDERLINE ANIMATION */
.nav-link::after {
  content: "";
  position: absolute;
  width: 0%;
  height: 2px;
  bottom: 0;
  left: 0;
  background: #ff9800;
  transition: 0.3s;
}

.nav-link:hover::after {
  width: 100%;
}

/* ACTIVE LINK */
.nav-link.active {
  color: #000 !important;
  font-weight: bold;
}

.nav-link.active::after {
  width: 100%;
  background: #000;
}

/* RESPONSIVE SPACING */
@media (max-width: 768px) {
  .nav-link {
    padding: 10px 0;
  }
}

</style>

<!-- ACTIVE LINK SCRIPT -->
<script>
const links = document.querySelectorAll(".nav-link");

links.forEach(link => {
  if (link.href === window.location.href) {
    link.classList.add("active");
  }
});
</script>
