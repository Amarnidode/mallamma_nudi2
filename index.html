<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>Mallamma Nudi</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: #f8f9fa;
    }

    /* clickable cards */
    .card {
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    /* calendar box */
    .calendar-box {
      background: #fff;
      border-radius: 10px;
      padding: 12px;
    }

    /* Title Strip (same as About/Contact) */
    .title-strip {
      background: #ddd;
      height: 60px;
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }

    .title-box {
      background: #3f3a47;
      color: white;
      padding: 10px 25px;
      font-size: 22px;
      font-weight: 500;
      position: relative;
    }

    .title-box::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 6px;
      background: #ffc107;
    }

  </style>

</head>

<body>

  <!-- HEADER -->
  <div id="header"></div>

  <!-- MAIN -->
  <div class="container mt-5 mb-5">
    <div class="row">


      <div class="title-strip mb-5">
        <div class="title-box">Mallamma Nudi</div>
      </div>
      <!-- LEFT: CARDS -->
      <div class="col-lg-9">
        <div class="row g-4">

          <!-- CARD 1 -->
          <div class="col-md-4">
            <div class="card shadow-sm border-bottom border-warning" onclick="openPaper('16-04-2026')">
              <div class="card p-2">
                <div style="height:320px; overflow:hidden; border-radius:10px;">
                  <img src="Images/16-04-2026/page1.jpg"
                    style="width:100%; height:100%; object-fit:cover; object-position: top;">
                </div>
              </div>
              <div class="card-body text-center">
                <h5>Mallamma Nudi</h5>
                <p class="text-muted">16 Apr 2026</p>
              </div>
            </div>
          </div>

          <!-- CARD 2 -->
          <div class="col-md-4">
            <div class="card shadow-sm border-bottom border-warning" onclick="openPaper('17-04-2026')">
              <div class="card p-2">
                <div style="height:320px; overflow:hidden; border-radius:10px;">
                  <img src="Images/17-04-2026/page1.jpg"
                    style="width:100%; height:100%; object-fit:cover; object-position: top;">
                </div>
              </div>
              <div class="card-body text-center">
                <h5>Mallamma Nudi</h5>
                <p class="text-muted">17 Apr 2026</p>
              </div>
            </div>
          </div>

          <!-- CARD 3 -->
          <div class="col-md-4">
            <div class="card shadow-sm border-bottom border-warning" onclick="openPaper('18-04-2026')">
              <div class="card p-2">
                <div style="height:320px; overflow:hidden; border-radius:10px;">
                  <img src="Images/18-04-2026/page1.jpg"
                    style="width:100%; height:100%; object-fit:cover; object-position: top;">
                </div>
              </div>
              <div class="card-body text-center">
                <h5>Mallamma Nudi</h5>
                <p class="text-muted">18 Apr 2026</p>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- RIGHT: CALENDAR -->
      <div class="col-lg-3">
        <div>
          <input type="text" id="calendarInput" class="form-control">
        </div>
      </div>

    </div>
  </div>

  <!-- //pagination -->
  <div class="bg-light py-3 border-top">
    <div class="container">
      <nav>
        <ul class="pagination justify-content-start mb-0">
          <li class="page-item"><a class="page-link" href="#">First</a></li>
          <li class="page-item"><a class="page-link" href="#">«</a></li>
          <li class="page-item active"><a class="page-link" href="#">1</a></li>
          <li class="page-item"><a class="page-link" href="#">2</a></li>
          <li class="page-item"><a class="page-link" href="#">3</a></li>
          <li class="page-item"><a class="page-link" href="#">4</a></li>
          <li class="page-item"><a class="page-link" href="#">»</a></li>
          <li class="page-item"><a class="page-link" href="#">Last</a></li>
        </ul>
      </nav>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="footer"></div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <script>
    // header/footer load
    function loadComponent(id, file) {
      fetch(file)
        .then(res => res.text())
        .then(data => {
          document.getElementById(id).innerHTML = data;
        });
    }

    loadComponent("header", "header.html");
    loadComponent("footer", "footer.html");


    // calendar
    flatpickr("#calendarInput", {
      inline: true,
      dateFormat: "d-m-Y",
      onChange: function (selectedDates) {
        let d = selectedDates[0];
      }
    });

    function openPaper(date) {
      window.location.href = `viewer.html?date=${date}`;
    }
  </script>

</body>

</html>
