<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us - Mallamma Nudi</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: #f5f5f5;
}

/* Title Strip */
.title-strip {
  background: #ddd;
  height: 60px;
  display: flex;
  align-items: center;
  margin-top: 20px;
}

.title-box {
  background: #3f3a47;
  color: white;
  padding: 10px 25px;
  font-size: 28px;
  font-weight: 500;
  position: relative;
}

.title-box::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: 6px;
  background: #ffc107;
}

/* Content */
.contact-content {
  background: white;
  padding: 30px;
  margin-top: 20px;
  border-radius: 8px;
  line-height: 1.7;
  text-align: center; /* 👈 CENTERED */
}
</style>
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<div class="container">

  <!-- Title -->
  <div class="title-strip">
    <div class="title-box">Contact Us</div>
  </div>

  <!-- Content -->
  <div class="contact-content">

    <p>Plot No. 442</p>
    <p>Kanpoor 2nd Stage, Industrial Area</p>
    <p>Kalaburagi - 585104</p>
    <p>Email: mallammanudi@gmail.com</p>

  </div>

</div>

<!-- FOOTER -->
<div id="footer"></div>

<script>
// Load header/footer
function loadComponent(id, file) {
  fetch(file)
    .then(res => res.text())
    .then(data => {
      document.getElementById(id).innerHTML = data;
    });
}

loadComponent("header", "header.html");
loadComponent("footer", "footer.html");
</script>

</body>
</html>
