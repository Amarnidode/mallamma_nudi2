<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Archive - Mallamma Nudi</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
body { background:#f5f5f5; }

/* SAME TITLE DESIGN */
.title-strip {
  background:#ddd;
  height:60px;
  display:flex;
  align-items:center;
  margin-top:20px;
}

.title-box {
  background:#3f3a47;
  color:white;
  padding:10px 25px;
  font-size:22px;
  position:relative;
}

.title-box::before {
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:6px;
  height:100%;
  background:#ffc107;
}

/* CALENDAR BOX */
.calendar-container {
  background:white;
  padding:20px;
  margin-top:20px;
  border-radius:10px;
  text-align:center;
}
</style>

</head>

<body>


<div class="container">

  <!-- CALENDAR -->
  <div class="calendar-container">
    <h5>Select Date</h5>
    <input type="text" id="calendarInput" class="form-control mt-3">
  </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
function loadComponent(id, file) {
  fetch(file)
    .then(res => res.text())
    .then(data => document.getElementById(id).innerHTML = data);
}


/* CALENDAR LOGIC */
flatpickr("#calendarInput", {
  inline: true,
  dateFormat: "d-m-Y",
  onChange: function(selectedDates) {

    let d = selectedDates[0];

    let formatted =
      String(d.getDate()).padStart(2,'0') + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      d.getFullYear();

    window.location.href = `viewer.html?date=${formatted}`;
  }
});
</script>

</body>
</html>
