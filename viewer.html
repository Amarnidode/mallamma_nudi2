<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Mallamma Nudi - Viewer</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <!-- html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    /* ================= GLOBAL ================= */
    body {
      background-color: #c3bdbdd8;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* ================= TOP BAR ================= */
    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: #ddd;
      flex-wrap: wrap;
    }

    /* ================= VIEWER LAYOUT ================= */
    .viewer-container {
      display: flex;
      margin-top: 10px;
      gap: 10px;
    }

    /* ================= SIDEBAR ================= */
    .sidebar {
      width: 250px;
      background: #eee;
      padding: 10px;
      overflow-y: auto;
      height: 130vh;
    }

    .sidebar img {
      width: 100%;
      cursor: pointer;
      border: 2px solid transparent;
      margin-bottom: 5px;
    }

    .sidebar img.active {
      border: 2px solid black;
    }

    /* ================= MAIN VIEWER ================= */
    .main-viewer {
      flex: 1;
      background: #ddd;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .main-viewer img {
      max-width: 100%;
      max-height: 100%;
      pointer-events: none;
    }

    /* ================= NAV BUTTONS ================= */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 30px;
      background: rgba(0, 0, 0, 0.4);
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      z-index: 10;
    }

    .nav-left {
      left: 10px;
    }

    .nav-right {
      right: 10px;
    }

    /* ================= CLIP BOX ================= */
    #clipBox {
      position: absolute;
      border: 2px dashed red;
      background: rgba(255, 0, 0, 0.2);
      display: none;
      pointer-events: none;
      z-index: 50;
    }

    /* ================= MODAL ================= */
    #modal {
      display: none;
      position: fixed;
      z-index: 99999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);

      justify-content: center;
      align-items: center;
    }

    #modalContent {
      background: #fff;
      width: 420px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
    }

    #modalContent img {
      width: 100%;
      margin-top: 10px;
    }

    /* ================= SOCIAL BUTTONS ================= */
    .socials button {
      margin: 3px;
      padding: 8px;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .fb {
      background: #3b5998;
    }

    .tw {
      background: black;
    }

    .wa {
      background: #25D366;
    }

    .mail {
      background: #e84393;
    }

    /* ================= CALENDAR ================= */
    .calendar-popup {
      position: fixed;
      top: 80px;
      right: -320px;
      width: 280px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
      transition: 0.3s ease;
      z-index: 1000;
    }

    .calendar-popup.show {
      right: 20px;
    }

    /* ================= PAGINATION ================= */
    #pageNumbers {
      display: flex;
      flex-wrap: nowrap;
      gap: 2px;
      overflow-x: auto;
    }

    #pageNumbers .page-item {
      flex: 0 0 auto;
    }

    #pageNumbers .page-link {
      font-size: 12px;
      padding: 4px 8px;
    }

    /* ================= MOBILE ================= */
    @media (max-width: 768px) {

      body {
        overflow-x: hidden;
      }

      .viewer-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        display: flex;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 8px;
      }

      .sidebar img {
        display: none;
      }

      .main-viewer {
        width: 100%;
        height: 70vh;
      }

      .main-viewer img {
        width: 100%;
        height: auto;
      }

      .nav-btn {
        font-size: 18px;
        padding: 6px 10px;
      }

      /* TOPBAR MOBILE */
      .topbar {
        flex-wrap: nowrap;
        overflow-x: auto;
        white-space: nowrap;
        gap: 5px;
      }

      /* PAGINATION MOBILE */
      #pageNumbers {
        flex-wrap: nowrap;
        overflow-x: auto;
      }

      #pageNumbers .page-link {
        font-size: 11px;
        padding: 3px 6px;
      }

      /* MODAL MOBILE */
      #modalContent {
        width: 95%;
        margin: 10% auto;
      }

      /* CALENDAR MOBILE */
      .calendar-popup {
        width: 90%;
        right: -100%;
      }

      .calendar-popup.show {
        right: 5%;
      }
    }
  </style>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <!-- HEADER -->
  <div id="header"></div>
  <div id="clip"></div>


  <!-- TOP BAR -->
  <div class="topbar container mt-1">
    <select class="form-select w-auto" onchange="goToPage(this.value)" id="pageDropdown"></select>

    <ul class="pagination mb-0" id="pageNumbers"></ul>

    <div class="ms-auto">

      <button class="btn btn-warning me-5" onclick="downloadPDF()">
        <i class="bi bi-file-earmark-pdf"></i> PDF
      </button>

      <button class="btn btn-warning" onclick="startClip()">
        <i class="bi bi-scissors"></i> Clip
      </button>

      <button class="btn btn-dark" onclick="openArchive()">
        <i class="bi bi-calendar"></i> Archive
      </button>

    </div>
  </div>

  <!-- CALENDAR -->
  <div id="calendarBox" class="calendar-popup">
    <input type="text" id="calendarInput" class="form-control">
  </div>

  <!-- VIEWER -->
  <div class="container viewer-container px-0">

    <div class="sidebar" id="sidebar"></div>

    <div class="main-viewer" id="mainViewer">
      <button class="nav-btn nav-left" onclick="prevPage()">❮</button>
      <img id="mainImage">
      <button class="nav-btn nav-right" onclick="nextPage()">❯</button>
      <div id="clipBox"></div>
    </div>

  </div>

  <!-- MODAL -->
  <div id="modal">
    <div id="modalContent">
      <h4>Clip Preview</h4>
      <img id="previewImg">
      <input type="text" id="shareLink" class="form-control mt-2" readonly>

      <div class="socials mt-2">
        <button class="wa" onclick="shareWhatsApp()">WhatsApp</button>
      </div>

      <div class="mt-2">
        <button class="btn btn-secondary" onclick="openImage()">Open</button>
        <button class="btn btn-secondary" onclick="downloadImage()">Download</button>
        <button class="btn btn-danger" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>


  <div id="clipBox"></div>
  <img id="mainImage">
  <div id="modal"></div>
  <!-- FOOTER -->
  <div id="footer"></div>


  <script>

    function loadComponent(id, file) {
      fetch("header.html")
        .then(res => res.text())
        .then(html => {
          document.getElementById("header").innerHTML = html;

          // ✅ FIX HAMBURGER CLICK
          const toggler = document.querySelector(".navbar-toggler");
          const menu = document.getElementById("navbarMenu");

          if (toggler && menu) {
            toggler.addEventListener("click", function () {
              menu.classList.toggle("show");
            });
          }
        });
    }

    loadComponent("header", "header.html");
    loadComponent("footer", "footer.html");

    const clipParam = new URLSearchParams(window.location.search).get("clip");

    if (clipParam) {
      const savedImage = localStorage.getItem(clipParam);

      if (savedImage) {
        document.getElementById("mainImage").src = savedImage;
      }
    }

    const params = new URLSearchParams(window.location.search);
    const date = params.get("date");

    let images = [];
    let currentPage = 0;

    const sidebar = document.getElementById("sidebar");
    const mainImage = document.getElementById("mainImage");
    const mainViewer = document.getElementById("mainViewer");
    const clipBox = document.getElementById("clipBox");
    const pageNumbers = document.getElementById("pageNumbers");
    const dropdown = document.getElementById("pageDropdown");

    // ================= PAGINATION VARIABLES =================
    let pageGroupStart = 0;
    const groupSize = 4;

    // LOAD IMAGES
    function loadImages(date) {
      let page = 1;

      function loadNext() {
        let path = `Images/${date}/page${page}.jpg`;
        let img = new Image();
        img.src = path;

        img.onload = function () {
          images.push(path);

          let thumb = document.createElement("img");
          thumb.src = path;
          thumb.onclick = () => goToPage(images.length - 1);

          sidebar.appendChild(thumb);

          let option = document.createElement("option");
          option.value = images.length - 1;
          option.text = "Page " + images.length;
          dropdown.appendChild(option);

          page++;
          loadNext();
        };

        img.onerror = function () {
          if (images.length > 0) {
            goToPage(0);
            renderPageNumbers();
          }
        };
      }

      loadNext();
    }

    if (date) loadImages(date);

    // ================= PAGE =================
    function goToPage(i) {
      currentPage = i;
      mainImage.src = images[i];

      document.querySelectorAll(".sidebar img").forEach((el, index) => {
        el.classList.toggle("active", index == i);
      });

      dropdown.value = i;

      renderPageNumbers(); // important
    }

    // ================= PAGINATION =================
    function renderPageNumbers() {
      pageNumbers.innerHTML = "";

      // FIRST
      let first = document.createElement("li");
      first.className = "page-item";
      first.innerHTML = `<a class="page-link" href="#">First</a>`;
      first.onclick = () => {
        pageGroupStart = 0;
        goToPage(0);
      };
      pageNumbers.appendChild(first);

      // PREVIOUS «
      let prev = document.createElement("li");
      prev.className = "page-item";
      prev.innerHTML = `<a class="page-link" href="#">«</a>`;
      prev.onclick = () => {
        if (pageGroupStart > 0) {
          pageGroupStart -= groupSize;
          renderPageNumbers();
        }
      };
      pageNumbers.appendChild(prev);

      // PAGE NUMBERS (4 only)
      for (let i = pageGroupStart; i < pageGroupStart + groupSize && i < images.length; i++) {
        let li = document.createElement("li");
        li.className = "page-item " + (i === currentPage ? "active" : "");

        li.innerHTML = `<a class="page-link" href="#">${i + 1}</a>`;
        li.onclick = () => goToPage(i);

        pageNumbers.appendChild(li);
      }

      // NEXT »
      let next = document.createElement("li");
      next.className = "page-item";
      next.innerHTML = `<a class="page-link" href="#">»</a>`;
      next.onclick = () => {
        if (pageGroupStart + groupSize < images.length) {
          pageGroupStart += groupSize;
          renderPageNumbers();
        }
      };
      pageNumbers.appendChild(next);

      // LAST
      let last = document.createElement("li");
      last.className = "page-item";
      last.innerHTML = `<a class="page-link" href="#">Last</a>`;
      last.onclick = () => {
        pageGroupStart = Math.floor((images.length - 1) / groupSize) * groupSize;
        goToPage(images.length - 1);
      };
      pageNumbers.appendChild(last);
    }

    // ================= NAV =================
    function nextPage() {
      if (currentPage < images.length - 1) {
        goToPage(currentPage + 1);
      }
    }

    function prevPage() {
      if (currentPage > 0) {
        goToPage(currentPage - 1);
      }
    }

    // ================= PDF =================
    function downloadPDF() {
      window.open(`pdfs/${date}.pdf`);
    }

    // ================= ARCHIVE =================
    function openArchive() {
      document.getElementById("calendarBox").classList.toggle("show");
    }

    document.addEventListener("click", function (event) {
      const calendarBox = document.getElementById("calendarBox");
      const archiveBtn = document.querySelector(".bi-calendar").closest("button");

      const isClickInsideCalendar = calendarBox.contains(event.target);
      const isClickArchiveButton = archiveBtn.contains(event.target);

      // If clicked outside both → close
      if (!isClickInsideCalendar && !isClickArchiveButton) {
        calendarBox.classList.remove("show");
      }
    });

    // ================= CALENDAR =================
    flatpickr("#calendarInput", {
      inline: true,
      onChange: function (selectedDates) {
        let d = selectedDates[0];
        let formatted =
          String(d.getDate()).padStart(2, '0') + '-' +
          String(d.getMonth() + 1).padStart(2, '0') + '-' +
          d.getFullYear();

        window.location.href = `?date=${formatted}`;
      }
    });

    let clipping = false;
    let startX = 0, startY = 0, endX = 0, endY = 0;
    let capturedImage = "";

    const viewer = document.getElementById("mainViewer");
    const img = document.getElementById("mainImage");
    const box = document.getElementById("clipBox");

    // ================= START CLIP =================
    function startClip() {
      if (!img.complete) {
        alert("Image still loading...");
        return;
      }

      clipping = true;
      viewer.style.cursor = "crosshair";
      box.style.display = "none";
    }

    // ================= COMMON CAPTURE FUNCTION =================
    function captureClip() {
      if (!clipping) return;

      clipping = false;
      viewer.style.cursor = "default";

      const rect = img.getBoundingClientRect();

      const scaleX = img.naturalWidth / rect.width;
      const scaleY = img.naturalHeight / rect.height;

      const x = Math.min(startX, endX) * scaleX;
      const y = Math.min(startY, endY) * scaleY;
      const w = Math.abs(endX - startX) * scaleX;
      const h = Math.abs(endY - startY) * scaleY;

      if (w < 10 || h < 10) {
        box.style.display = "none";
        return;
      }

      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, x, y, w, h, 0, 0, w, h);

      capturedImage = canvas.toDataURL("image/png");

      document.getElementById("previewImg").src = capturedImage;

      const modal = document.getElementById("modal");
      modal.style.display = "flex";
      modal.style.alignItems = "center";
      modal.style.justifyContent = "center";

      box.style.display = "none";
    }

    // ================= DESKTOP MOUSE =================
    viewer.addEventListener("mousedown", (e) => {
      if (!clipping) return;

      const rect = img.getBoundingClientRect();

      startX = e.clientX - rect.left;
      startY = e.clientY - rect.top;

      box.style.display = "block";
    });

    viewer.addEventListener("mousemove", (e) => {
      if (!clipping) return;

      const rect = img.getBoundingClientRect();

      endX = e.clientX - rect.left;
      endY = e.clientY - rect.top;

      box.style.left = Math.min(startX, endX) + "px";
      box.style.top = Math.min(startY, endY) + "px";
      box.style.width = Math.abs(endX - startX) + "px";
      box.style.height = Math.abs(endY - startY) + "px";
    });

    document.addEventListener("mouseup", captureClip);

    // ================= MOBILE TOUCH =================
    viewer.addEventListener("touchstart", (e) => {
      if (!clipping) return;

      const rect = img.getBoundingClientRect();
      const touch = e.touches[0];

      startX = touch.clientX - rect.left;
      startY = touch.clientY - rect.top;

      box.style.display = "block";
    });

    viewer.addEventListener("touchmove", (e) => {
      if (!clipping) return;

      const rect = img.getBoundingClientRect();
      const touch = e.touches[0];

      endX = touch.clientX - rect.left;
      endY = touch.clientY - rect.top;

      box.style.left = Math.min(startX, endX) + "px";
      box.style.top = Math.min(startY, endY) + "px";
      box.style.width = Math.abs(endX - startX) + "px";
      box.style.height = Math.abs(endY - startY) + "px";

      e.preventDefault(); // stop scroll while selecting
    }, { passive: false });

    viewer.addEventListener("touchend", captureClip);


    // ================= MODAL ACTIONS FIX =================

    // OPEN IMAGE (new tab)
    function openImage() {
      if (!capturedImage) return;

      const win = window.open();
      win.document.write(`
    <title>Clip Preview</title>
    <img src="${capturedImage}" style="width:100%;height:auto;">
  `);
    }

    // DOWNLOAD IMAGE
    function downloadImage() {
      if (!capturedImage) return;

      const a = document.createElement("a");
      a.href = capturedImage;
      a.download = "clip.png";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // CLOSE MODAL (return to same page state)
    function closeModal() {
      document.getElementById("modal").style.display = "none";

      // optional cleanup (prevents stuck overlay issues)
      document.getElementById("previewImg").src = "";
    }
    // ================= SHARE FIX =================
    function shareWhatsApp() {
      if (!capturedImage) return alert("No image");

      fetch(capturedImage)
        .then(res => res.blob())
        .then(blob => {
          const file = new File([blob], "clip.png", { type: "image/png" });

          if (navigator.share && navigator.canShare({ files: [file] })) {
            navigator.share({
              files: [file],
              title: "Mallamma Nudi Clip"
            });
          } else {
            window.open(`https://wa.me/?text=Check this clip`);
          }
        });
    }

    function shareFB() {
      window.open("https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(location.href));
    }

    function shareTwitter() {
      window.open("https://twitter.com/intent/tweet?url=" + encodeURIComponent(location.href));
    }

    function shareEmail() {
      window.location.href = "mailto:?subject=Clip&body=Check this clip";
    }
  </script>

</body>

</html>
