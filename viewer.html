<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Mallamma Nudi - Viewer</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <style>
    body {
      background-color: #f5f5f5;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: #ddd;
    }

    /* PAGE BUTTONS */
    .pages button {
      padding: 6px 12px;
      border: none;
      background: #ccc;
      margin-right: 5px;
      cursor: pointer;
    }

    .pages button.active {
      background: #333;
      color: white;
    }

    /* BUTTON COLORS */
    .pdf-btn {
      background: gold;
    }

    .clip-btn {
      background: orange;
    }

    .archive-btn {
      background: #444;
      color: white;
    }

    /* VIEWER */
    .viewer-container {
      display: flex;
      margin-top: 10px;
    }

    .sidebar {
      width: 250px;
      background: #eee;
      padding: 10px;
      overflow-y: auto;
      height: 130vh;
    }

    .sidebar img {
      width: 100%;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .sidebar img.active {
      border: 2px solid black;
    }

    .main-viewer {
      flex: 1;
      background: #ddd;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .main-viewer img {
      max-width: 100%;
      max-height: 100%;
    }

    /* NAV */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 30px;
      background: rgba(0, 0, 0, 0.4);
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
    }

    .nav-left {
      left: 10px;
    }

    .nav-right {
      right: 10px;
    }

    /* CLIP BOX */
    #clipBox {
      position: absolute;
      border: 2px dashed red;
      background: rgba(255, 0, 0, 0.2);
      display: none;
    }

    /* CALENDAR */
    #calendarBox {
      display: none;
    }

    /* MODAL */
    #modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
    }

    #modalContent {
      background: #fff;
      width: 420px;
      margin: 4% auto;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    #modalContent img {
      width: 100%;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    .socials button {
      margin: 3px;
      padding: 8px;
      border: none;
      color: white;
      cursor: pointer;
    }

    .fb {
      background: #3b5998;
    }

    .tw {
      background: black;
    }

    .wa {
      background: #25D366;
    }

    .mail {
      background: #e84393;
    }

    .viewer-container {
      display: flex;
      margin-top: 10px;
      gap: 10px;
      /* spacing between sidebar & viewer */
    }

    /* SAME COLOR FOR PDF & CLIP */
    .pdf-btn,
    .clip-btn {
      background-color: #ffc107;
      /* Bootstrap warning yellow */
      color: black;
      border: none;
    }

    .pdf-btn:hover,
    .clip-btn:hover {
      background-color: #e0a800;
      color: black;
    }
  </style>
</head>

<body>

  <div id="header"></div>

  <!-- TOP BAR -->

  <div class="topbar">
    <div class="container d-flex align-items-center gap-2">

      <select class="form-select w-auto" onchange="goToPage(this.value)" id="pageDropdown"></select>

      <div class="pages" id="pageNumbers"></div>

      <div class="ms-auto">
        <button class="btn pdf-btn" onclick="downloadPDF()">PDF</button>
        <button class="btn clip-btn" onclick="startClip()">Clip</button>
        <button class="btn archive-btn" onclick="openArchive()">Archive</button>
        <button class="btn btn-secondary" onclick="takeScreenshot()">Screenshot</button>
      </div>

    </div>
  </div>

  <!-- CALENDAR -->
  <div class="container mt-2" id="calendarBox">
    <input type="text" id="calendarInput" class="form-control">
  </div>

  <!-- VIEWER -->
  <div class="container viewer-container px-0">

    <div class="sidebar" id="sidebar"></div>

    <div class="main-viewer" id="mainViewer">
      <button class="nav-btn nav-left" onclick="prevPage()">❮</button>
      <img id="mainImage">
      <button class="nav-btn nav-right" onclick="nextPage()">❯</button>
      <div id="clipBox"></div>
    </div>

  </div>

  <!-- MODAL -->
  <div id="modal">
    <div id="modalContent">
      <h4>Clip Preview</h4>
      <img id="previewImg">

      <input type="text" id="shareLink" class="form-control mt-2" readonly>

      <div class="socials mt-2">
        <button class="fb" onclick="shareFB()">FACEOOB</button>
        <button class="tw" onclick="shareTwitter()">X</button>
        <button class="wa" onclick="shareWhatsApp()">WHATSAPP</button>
        <button class="mail" onclick="shareEmail()">Mail</button>
      </div>

      <div class="mt-2">
        <button class="btn btn-secondary" onclick="openImage()">Open</button>
        <button class="btn btn-secondary" onclick="downloadImage()">Download</button>
        <button class="btn btn-danger" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>

  <div id="footer"></div>

  <script>

    // LOAD HEADER FOOTER
    function loadComponent(id, file) {
      fetch(file)
        .then(res => res.text())
        .then(data => document.getElementById(id).innerHTML = data);
    }
    loadComponent("header", "header.html");
    loadComponent("footer", "footer.html");

    // DATE
    const params = new URLSearchParams(window.location.search);
    const date = params.get("date");

    // VARIABLES
    let images = [];
    let currentPage = 0;

    const sidebar = document.getElementById("sidebar");
    const mainImage = document.getElementById("mainImage");
    const mainViewer = document.getElementById("mainViewer");
    const clipBox = document.getElementById("clipBox");
    const pageNumbers = document.getElementById("pageNumbers");
    const dropdown = document.getElementById("pageDropdown");

    // LOAD IMAGES
    function loadImages(date) {
      images = [];
      sidebar.innerHTML = "";
      dropdown.innerHTML = "";

      let page = 1;

      function loadNext() {
        let path = `Images/${date}/page${page}.jpg`;

        let img = new Image();
        img.src = path;

        img.onload = function () {
          images.push(path);

          let div = document.createElement("div");

          let thumb = document.createElement("img");
          thumb.src = path;
          thumb.onclick = () => goToPage(images.length - 1);

          let label = document.createElement("div");
          label.innerText = "Page " + images.length;
          label.onclick = () => goToPage(images.length - 1);

          div.appendChild(thumb);
          div.appendChild(label);
          sidebar.appendChild(div);

          let option = document.createElement("option");
          option.value = images.length - 1;
          option.text = "Page " + images.length;
          dropdown.appendChild(option);

          page++;
          loadNext();
        };

        img.onerror = function () {
          if (images.length > 0) {
            goToPage(0);
            renderPageNumbers();
          }
        };
      }

      loadNext();
    }

    if (date) loadImages(date);

    // PAGE SWITCH
    function goToPage(i) {
      currentPage = i;
      mainImage.src = images[i];

      document.querySelectorAll(".sidebar img").forEach((el, index) => {
        el.classList.toggle("active", index == i);
      });

      dropdown.value = i;
      renderPageNumbers();
    }

    // PAGE BUTTONS
    function renderPageNumbers() {
      pageNumbers.innerHTML = "";
      images.forEach((_, i) => {
        let btn = document.createElement("button");
        btn.innerText = i + 1;
        if (i === currentPage) btn.classList.add("active");
        btn.onclick = () => goToPage(i);
        pageNumbers.appendChild(btn);
      });
    }

    // NAV
    function nextPage() { if (currentPage < images.length - 1) goToPage(currentPage + 1); }
    function prevPage() { if (currentPage > 0) goToPage(currentPage - 1); }

    // PDF
    function downloadPDF() {
      window.open(`pdfs/${date}.pdf`);
    }

    // ARCHIVE
    function openArchive() {
      window.open(
        "calender.html",
        "Calendar",
        "width=400,height=450,top=150,left=500"
      );
    }

    // CALENDAR
    flatpickr("#calendarInput", {
      inline: true,
      onChange: function (selectedDates) {
        let d = selectedDates[0];
        let formatted =
          String(d.getDate()).padStart(2, '0') + '-' +
          String(d.getMonth() + 1).padStart(2, '0') + '-' +
          String(d.getFullYear()).slice(-2);

        window.location.href = `viewer.html?date=${formatted}`;
      }
    });

    // SCREENSHOT
    function takeScreenshot() {
      html2canvas(mainViewer).then(canvas => {
        let link = document.createElement("a");
        link.download = "paper.png";
        link.href = canvas.toDataURL();
        link.click();
      });
    }

    // CLIP TOOL
    let clipping = false, sx, sy, ex, ey, capturedImage;

    function startClip() {
      clipping = true;
      mainViewer.style.cursor = "crosshair";
    }

    mainViewer.addEventListener("mousedown", e => {
      if (!clipping) return;
      let r = mainViewer.getBoundingClientRect();
      sx = e.clientX - r.left; sy = e.clientY - r.top;
      clipBox.style.display = "block";
    });

    mainViewer.addEventListener("mousemove", e => {
      if (!clipping) return;
      let r = mainViewer.getBoundingClientRect();
      ex = e.clientX - r.left; ey = e.clientY - r.top;

      clipBox.style.width = Math.abs(ex - sx) + "px";
      clipBox.style.height = Math.abs(ey - sy) + "px";
      clipBox.style.left = Math.min(sx, ex) + "px";
      clipBox.style.top = Math.min(sy, ey) + "px";
    });

    mainViewer.addEventListener("mouseup", async () => {
      if (!clipping) return;
      clipping = false;
      mainViewer.style.cursor = "default";

      const canvas = await html2canvas(mainViewer);

      let x = Math.min(sx, ex), y = Math.min(sy, ey);
      let w = Math.abs(ex - sx), h = Math.abs(ey - sy);

      const crop = document.createElement("canvas");
      crop.width = w; crop.height = h;

      crop.getContext("2d").drawImage(canvas, x, y, w, h, 0, 0, w, h);
      capturedImage = crop.toDataURL();

      document.getElementById("previewImg").src = capturedImage;
      document.getElementById("shareLink").value = "Generated Clip";
      document.getElementById("modal").style.display = "block";

      clipBox.style.display = "none";
    });

    // MODAL FUNCTIONS
    function closeModal() { document.getElementById("modal").style.display = "none"; }

    function openImage() {
      let w = window.open();
      w.document.write(`<img src="${capturedImage}" style="width:100%">`);
    }

    function downloadImage() {
      let a = document.createElement("a");
      a.href = capturedImage;
      a.download = "clip.png";
      a.click();
    }

    // SHARE
    function shareWhatsApp() { window.open(`https://wa.me/?text=Check this clip`); }
    function shareFB() { window.open(`https://facebook.com/sharer/sharer.php`); }
    function shareTwitter() { window.open(`https://twitter.com/intent/tweet`); }
    function shareEmail() { window.location.href = `mailto:?subject=Clip`; }

  </script>
</body>

</html>
